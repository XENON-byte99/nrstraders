{# Shared visual language for the letterhead design (invoice + quotation).    #}
{# Centred masthead on a tinted banner, accent-filled table head and totals.  #}
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&amp;family=Inter:wght@400;500;600;700&amp;family=Roboto+Mono:wght@400;500;700&amp;display=swap" rel="stylesheet">
<style>
    .a4-invoice.layout-letterhead {
        background: #ffffff;
        font-family: 'Inter', sans-serif;
        color: #111827;
        font-size: 10px;
    }
    .layout-letterhead .fit-wrap { display: block; }
    .layout-letterhead .mono { font-family: 'Roboto Mono', monospace; }

    .lh-page { min-height: 11.69in; display: flex; flex-direction: column; padding-bottom: 0.34in; }

    /* ── Masthead: accent bar over a tinted banner ── */
    .lh-mast {
        text-align: center; padding: 0.34in 0.5in 0.24in;
        background: var(--accent-soft);
        border-top: 7px solid var(--accent);
        border-bottom: 2px solid var(--accent);
    }
    .lh-mast-name { font-family: 'Libre Baskerville', serif; font-weight: 700; font-size: 26px; letter-spacing: .06em; color: var(--accent); line-height: 1.1; }
    .lh-mast-rule { width: 74px; height: 2px; background: var(--accent-2); margin: 8px auto 7px; }
    .lh-mast-meta { font-size: 8.5px; letter-spacing: .05em; color: #4b5563; line-height: 1.65; }
    .lh-mast-meta span + span::before { content: "  •  "; color: var(--accent-2); }

    .layout-letterhead .invoice-body { flex: 1; display: flex; flex-direction: column; padding: 0 0.5in; }

    /* ── Document title bar ── */
    .lh-titlebar { display: flex; justify-content: space-between; align-items: baseline; margin: 14px 0 5px; }
    .lh-doctype { font-family: 'Libre Baskerville', serif; font-size: 19px; font-weight: 700; letter-spacing: .22em; text-transform: uppercase; color: var(--accent); }
    .lh-doctag { font-size: 8px; font-weight: 600; letter-spacing: .16em; text-transform: uppercase; color: #fff; background: var(--accent-2); padding: 3px 9px; border-radius: 10px; }
    .lh-hair { height: 2px; background: var(--accent); margin-bottom: 14px; }

    /* ── Party / details grid ── */
    .lh-parties { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; margin-bottom: 13px; }
    .lh-h {
        font-size: 7.5px; font-weight: 700; letter-spacing: .2em; text-transform: uppercase;
        color: var(--accent); padding-bottom: 3px; border-bottom: 1.5px solid var(--accent-line); margin-bottom: 6px;
    }
    .lh-party-name { font-family: 'Libre Baskerville', serif; font-size: 12.5px; font-weight: 700; color: #111827; margin-bottom: 2px; }
    .lh-line { font-size: 9.5px; color: #4b5563; line-height: 1.55; }
    .lh-dl { display: grid; grid-template-columns: auto 1fr; gap: 2px 12px; font-size: 9.5px; }
    .lh-dt { color: #6b7280; }
    .lh-dd { font-family: 'Roboto Mono', monospace; font-weight: 500; color: var(--accent); text-align: right; }

    .lh-subject {
        font-size: 9.5px; line-height: 1.6; color: #374151;
        background: var(--accent-soft); border-left: 3px solid var(--accent);
        padding: 7px 11px; border-radius: 0 5px 5px 0; margin-bottom: 12px;
    }
    .lh-subject b { font-family: 'Libre Baskerville', serif; color: var(--accent); }

    /* ── Items ── */
    .lh-items { flex: 1 0 auto; }
    .lh-cat { font-size: 8px; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; color: #fff; background: var(--accent-2); display: inline-block; padding: 2px 8px; margin: 0 0 5px; }
    .layout-letterhead table { width: 100%; border-collapse: collapse; font-size: 8.8px; table-layout: fixed; margin-bottom: 10px; }
    .layout-letterhead th {
        background: var(--accent) !important; color: #fff; padding: 6px 5px; text-align: left;
        font-weight: 600; font-size: 7px; letter-spacing: .09em; text-transform: uppercase;
        border-right: 1px solid rgba(255, 255, 255, 0.22);
        white-space: normal; word-break: break-word;
    }
    .layout-letterhead th:last-child { border-right: none; }
    .layout-letterhead td { padding: 4.5px 5px; border-bottom: 1px solid #e5e7eb; color: #1f2937; }
    .layout-letterhead tbody tr:nth-child(odd) { background: var(--zebra); }
    .layout-letterhead tbody tr:last-child td { border-bottom: 2px solid var(--accent); }
    .layout-letterhead .col-group-base { background: transparent !important; }
    .layout-letterhead .col-group-tax { background: transparent !important; }
    .layout-letterhead .col-group-vat { background: var(--accent-tint) !important; font-weight: 600; }

    /* ── Totals ── */
    .layout-letterhead .amount-section { display: grid; grid-template-columns: 1fr 2.65in; gap: 20px; margin-top: 10px; align-items: start; }
    .layout-letterhead .amount-box { border: 1.5px solid var(--accent); border-radius: 6px; overflow: hidden; background: #fff; align-self: start; }
    .layout-letterhead .amount-row { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; padding: 5px 10px; background: #fff; border-bottom: 1px solid #eef0f4; margin: 0; }
    .layout-letterhead .amount-row:nth-child(even) { background: var(--zebra); }
    .layout-letterhead .amount-box .amount-row:last-child { border-bottom: none; }
    .layout-letterhead .amount-label { font-size: 9px; color: #4b5563; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
    .layout-letterhead .amount-value { font-family: 'Roboto Mono', monospace; font-size: 9.5px; font-weight: 500; color: #111827; white-space: nowrap; flex-shrink: 0; }
    .layout-letterhead .amount-row.total { background: var(--accent) !important; color: #fff; border-bottom: none; padding: 8px 10px; }
    .layout-letterhead .amount-row.total .amount-label { font-family: 'Libre Baskerville', serif; font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: #fff; }
    .layout-letterhead .amount-row.total .amount-value { font-size: 14px; font-weight: 700; color: #fff; }

    .lh-note { font-size: 8.5px; line-height: 1.65; color: #4b5563; }
    .lh-note b { color: #111827; }
    .lh-attn { border: 1px solid #fbcfe1; border-left: 3px solid #9f1239; background: #fff5f7; padding: 7px 9px; margin-top: 9px; border-radius: 0 5px 5px 0; }
    .lh-attn-h { font-size: 8px; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; color: #9f1239; margin-bottom: 3px; }

    /* ── Sign-off ── */
    .lh-signoff { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 22px; }
    .lh-closing { font-family: 'Libre Baskerville', serif; font-style: italic; font-size: 10px; color: #4b5563; }
    .layout-letterhead .signature-box { position: relative; display: flex; flex-direction: column; align-items: center; width: 2.3in; cursor: grab; z-index: 50; text-align: center; }
    .layout-letterhead .official-signature { height: 66px; position: absolute; bottom: 26px; left: 50%; transform: translateX(-50%) rotate(-1deg); mix-blend-mode: multiply; z-index: 10; }
    .layout-letterhead .signature-line { border-bottom: 1.5px solid var(--accent); width: 100%; height: 34px; margin-bottom: 4px; }
    .layout-letterhead .sig-name { font-family: 'Libre Baskerville', serif; font-weight: 700; font-size: 10.5px; color: #111827; }
    .layout-letterhead .sig-title { font-size: 8.5px; color: #6b7280; letter-spacing: .05em; }

    .lh-foot {
        /* full-bleed strip: cancel the body's side padding */
        margin: 14px -0.5in 0; padding: 6px 0; text-align: center;
        background: var(--accent); color: #fff;
        font-size: 7.5px; font-weight: 600; letter-spacing: .16em; text-transform: uppercase;
    }
</style>
