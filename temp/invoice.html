<!doctype html>
<html lang="en" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Invoice</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <script src="/_sdk/element_sdk.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&amp;family=Poppins:wght@400;500;600;700;800&amp;family=IBM+Plex+Mono:wght@400;600&amp;display=swap"
        rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #f0f4f8;
        }

        .mono {
            font-family: 'IBM Plex Mono', monospace;
        }

        .display-font {
            font-family: 'Playfair Display', serif;
        }

        @media print {
            body {
                background: white !important;
            }

            .no-print {
                display: none !important;
            }

            .a4-invoice {
                box-shadow: none !important;
                margin: 0 !important;
                padding: 0 !important;
            }

            html,
            body {
                width: 8.5in;
                height: 11in;
            }
        }

        .a4-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100%;
            padding: 20px;
        }

        .a4-invoice {
            width: 8.5in;
            height: 11in;
            background: white;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .invoice-header {
            background: linear-gradient(135deg, var(--primary-color, #667eea) 0%, var(--accent-color, #764ba2) 100%);
            color: white;
            padding: 32px 28px 24px;
            position: relative;
            overflow: hidden;
        }

        .invoice-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 400px;
            height: 400px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
        }

        .invoice-header-content {
            position: relative;
            z-index: 2;
        }

        .invoice-title {
            font-size: 42px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin: 0;
            font-family: 'Playfair Display', serif;
        }

        .invoice-subtitle {
            font-size: 11px;
            opacity: 0.9;
            margin-top: 4px;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .invoice-body {
            padding: 28px;
            flex: 1;
            display: flex;
            flex-direction: column;
            font-size: 10px;
            overflow: hidden;
        }

        .section-title {
            font-size: 10px;
            font-weight: 700;
            color: var(--primary-color, #667eea);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
        }

        .info-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 16px;
        }

        .info-block {
            line-height: 1.6;
        }

        .info-label {
            font-size: 8px;
            font-weight: 700;
            color: var(--primary-color, #667eea);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 3px;
        }

        .info-value {
            font-size: 11px;
            font-weight: 500;
            color: #1e293b;
        }

        .company-name {
            font-family: 'Playfair Display', serif;
            font-size: 12px;
            font-weight: 700;
            color: var(--primary-color, #667eea);
            margin-bottom: 2px;
        }

        .divider {
            height: 1px;
            background: linear-gradient(to right, transparent, var(--primary-color, #667eea), transparent);
            margin: 12px 0;
        }

        .invoice-details {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
            padding-bottom: 12px;
        }

        .detail-item {
            border-left: 2px solid var(--primary-color, #667eea);
            padding-left: 8px;
        }

        .detail-label {
            font-size: 8px;
            font-weight: 700;
            color: var(--primary-color, #667eea);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 2px;
        }

        .detail-value {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            font-weight: 700;
            color: #1e293b;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 12px;
            font-size: 9px;
        }

        th {
            background: linear-gradient(135deg, var(--primary-color, #667eea) 0%, var(--accent-color, #764ba2) 100%);
            color: white;
            padding: 6px 4px;
            text-align: left;
            font-weight: 700;
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        td {
            padding: 5px 4px;
            border-bottom: 1px solid #e2e8f0;
            color: #1e293b;
        }

        tbody tr:nth-child(odd) {
            background: #f8fafc;
        }

        tbody tr:nth-child(even) {
            background: white;
        }

        .amount-section {
            display: grid;
            grid-template-columns: 1fr 140px;
            gap: 16px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px dashed #cbd5e1;
        }

        .terms {
            font-size: 8px;
            color: #475569;
            line-height: 1.4;
        }

        .amount-boxes {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .amount-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px;
            background: #f8fafc;
            border-radius: 3px;
            border-left: 2px solid var(--primary-color, #667eea);
        }

        .amount-row.total {
            background: linear-gradient(135deg, var(--primary-color, #667eea) 0%, var(--accent-color, #764ba2) 100%);
            color: white;
            font-weight: 800;
            border: none;
        }

        .amount-label {
            font-weight: 600;
            font-size: 8px;
        }

        .amount-value {
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 700;
            font-size: 10px;
        }

        .invoice-footer {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            padding-top: 12px;
            border-top: 1px dashed #cbd5e1;
            margin-top: auto;
        }

        .signature-box {
            text-align: center;
            padding: 8px;
        }

        .signature-line {
            height: 30px;
            border-bottom: 1px solid #1e293b;
            margin-bottom: 4px;
        }

        .signature-label {
            font-size: 7px;
            font-weight: 700;
            color: #1e293b;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .form-input {
            width: 100%;
            padding: 8px 10px;
            border: 1.5px solid #cbd5e1;
            border-radius: 6px;
            font-size: 11px;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-color, #667eea);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
    </style>
    <style>
        body {
            box-sizing: border-box;
        }
    </style>
    <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
</head>

<body class="h-full">
    <div class="a4-container"><!-- Toolbar -->
        <div class="no-print flex flex-col gap-4 mr-4">
            <div class="flex flex-col gap-2"><label class="text-xs font-medium text-slate-600">Invoice Date</label>
                <input type="date" id="invoiceDate" class="form-input w-40">
            </div>
            <div class="flex flex-col gap-2"><label class="text-xs font-medium text-slate-600">Due Date</label> <input
                    type="date" id="dueDate" class="form-input w-40">
            </div><button onclick="addItemRow()"
                class="px-3 py-2 bg-blue-600 text-white text-xs rounded-lg hover:bg-blue-700 transition flex items-center justify-center gap-1">
                <i data-lucide="plus" style="width:14px;height:14px;"></i> Add Item </button> <button
                onclick="removeItemRow()"
                class="px-3 py-2 bg-orange-600 text-white text-xs rounded-lg hover:bg-orange-700 transition flex items-center justify-center gap-1">
                <i data-lucide="minus" style="width:14px;height:14px;"></i> Remove Item </button> <button
                onclick="window.print()"
                class="px-3 py-2 bg-gradient-to-r from-purple-600 to-pink-600 text-white text-xs rounded-lg hover:shadow-lg transition flex items-center justify-center gap-1">
                <i data-lucide="printer" style="width:14px;height:14px;"></i> Print </button>
        </div><!-- A4 Invoice -->
        <div class="a4-invoice" id="invoiceDocument"></div>
    </div>
    <script>
        const defaultConfig = {
            your_company_name: 'PREMIER SOLUTIONS',
            company_email: 'invoice@premiersolutions.com',
            company_phone: '+1 (555) 123-4567',
            client_name: 'Acme Corporation',
            client_email: 'accounts@acmecorp.com',
            client_address: '123 Business Avenue, New York, NY 10001',
            invoice_number: 'INV-2024-001',
            terms_condition: 'Payment terms: Net 30 days. 2% discount for payment within 10 days.',
            primary_color: '#667eea',
            accent_color: '#764ba2',
            background_color: '#ffffff',
            text_color: '#1e293b',
            highlight_color: '#f5576c',
            font_family: 'Poppins',
            font_size: 11
        };

        let itemCount = 5;

        const sampleItems = [
            { desc: 'Professional Web Design Services', qty: 1, rate: '₹15,000', amount: '₹15,000' },
            { desc: 'UI/UX Consultation (10 hours)', qty: 10, rate: '₹2,500/hr', amount: '₹25,000' },
            { desc: 'Cloud Infrastructure Setup', qty: 1, rate: '₹8,500', amount: '₹8,500' },
            { desc: 'Security Audit & Testing', qty: 1, rate: '₹12,000', amount: '₹12,000' },
            { desc: 'API Integration & Development', qty: 15, rate: '₹1,800/hr', amount: '₹27,000' }
        ];

        function getInvoiceDate() {
            const el = document.getElementById('invoiceDate');
            return el ? el.value : new Date().toISOString().split('T')[0];
        }

        function getDueDate() {
            const el = document.getElementById('dueDate');
            return el ? el.value : '';
        }

        function generateTableRows() {
            let rows = '';
            for (let i = 0; i < itemCount; i++) {
                const item = sampleItems[i % sampleItems.length];
                rows += `<tr>
          <td style="text-align:center;width:8%;">${String(i + 1).padStart(2, '0')}</td>
          <td style="text-align:left;">${item.desc}</td>
          <td style="text-align:center;width:12%;">${item.qty}</td>
          <td style="text-align:right;width:18%;">${item.rate}</td>
          <td style="text-align:right;width:18%;">${item.amount}</td>
        </tr>`;
            }
            return rows;
        }

        function buildInvoice(config) {
            const c = { ...defaultConfig, ...config };
            const subtotal = 127500;
            const tax = 22950;
            const total = 150450;

            return `
        <div class="invoice-header" style="--primary-color:${c.primary_color};--accent-color:${c.accent_color};">
          <div class="invoice-header-content">
            <h1 class="invoice-title">INVOICE</h1>
            <p class="invoice-subtitle">Professional Business Document</p>
          </div>
        </div>

        <div class="invoice-body" style="--primary-color:${c.primary_color};--accent-color:${c.accent_color};">
          <!-- From and Bill To Section -->
          <div class="info-row">
            <div class="info-block">
              <div class="section-title">From</div>
              <div class="company-name">${c.your_company_name}</div>
              <div class="info-value">${c.company_email}</div>
              <div class="info-value">${c.company_phone}</div>
            </div>
            <div class="info-block">
              <div class="section-title">Bill To</div>
              <div class="company-name">${c.client_name}</div>
              <div class="info-value">${c.client_email}</div>
              <div class="info-value">${c.client_address}</div>
            </div>
          </div>

          <div class="divider"></div>

          <!-- Invoice Details -->
          <div class="invoice-details">
            <div class="detail-item">
              <div class="detail-label">Invoice No.</div>
              <div class="detail-value">${c.invoice_number}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Issue Date</div>
              <div class="detail-value">${getInvoiceDate()}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Due Date</div>
              <div class="detail-value">${getDueDate() || '---'}</div>
            </div>
          </div>

          <!-- Items Table -->
          <table>
            <thead>
              <tr>
                <th style="width:8%;">SL</th>
                <th>Description</th>
                <th style="width:12%;">Qty</th>
                <th style="width:18%;">Rate</th>
                <th style="width:18%;">Amount</th>
              </tr>
            </thead>
            <tbody>
              ${generateTableRows()}
            </tbody>
          </table>

          <!-- Amount Section -->
          <div class="amount-section">
            <div class="terms">
              <div style="font-weight:700;margin-bottom:4px;">Terms & Conditions</div>
              ${c.terms_condition}
            </div>
            <div class="amount-boxes">
              <div class="amount-row">
                <span class="amount-label">Subtotal</span>
                <span class="amount-value">₹${subtotal.toLocaleString()}</span>
              </div>
              <div class="amount-row">
                <span class="amount-label">Tax (18%)</span>
                <span class="amount-value">₹${tax.toLocaleString()}</span>
              </div>
              <div class="amount-row total">
                <span class="amount-label">Total</span>
                <span class="amount-value">₹${total.toLocaleString()}</span>
              </div>
            </div>
          </div>

          <!-- Footer with Signatures -->
          <div class="invoice-footer">
            <div class="signature-box">
              <div class="signature-line"></div>
              <div class="signature-label">Company Authorized</div>
            </div>
            <div class="signature-box">
              <div class="signature-line"></div>
              <div class="signature-label">Client Authorized</div>
            </div>
          </div>
        </div>
      `;
        }

        function renderInvoice(config) {
            const doc = document.getElementById('invoiceDocument');
            doc.innerHTML = buildInvoice(config);
        }

        function addItemRow() {
            if (itemCount < 10) {
                itemCount++;
                renderInvoice(window.elementSdk?.config || {});
            }
        }

        function removeItemRow() {
            if (itemCount > 2) {
                itemCount--;
                renderInvoice(window.elementSdk?.config || {});
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('invoiceDate').value = today;
            document.getElementById('invoiceDate').addEventListener('change', () => renderInvoice(window.elementSdk?.config || {}));
            document.getElementById('dueDate').addEventListener('change', () => renderInvoice(window.elementSdk?.config || {}));
            renderInvoice(defaultConfig);
            lucide.createIcons();
        });

        window.elementSdk.init({
            defaultConfig,
            onConfigChange: async (config) => {
                renderInvoice(config);
                lucide.createIcons();
            },
            mapToCapabilities: (config) => ({
                recolorables: [
                    { get: () => config.primary_color || defaultConfig.primary_color, set: (v) => { config.primary_color = v; window.elementSdk.setConfig({ primary_color: v }); } },
                    { get: () => config.accent_color || defaultConfig.accent_color, set: (v) => { config.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); } },
                    { get: () => config.highlight_color || defaultConfig.highlight_color, set: (v) => { config.highlight_color = v; window.elementSdk.setConfig({ highlight_color: v }); } },
                    { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
                    { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } }
                ],
                borderables: [],
                fontEditable: {
                    get: () => config.font_family || defaultConfig.font_family,
                    set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
                },
                fontSizeable: {
                    get: () => config.font_size || defaultConfig.font_size,
                    set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); }
                }
            }),
            mapToEditPanelValues: (config) => new Map([
                ['your_company_name', config.your_company_name || defaultConfig.your_company_name],
                ['company_email', config.company_email || defaultConfig.company_email],
                ['company_phone', config.company_phone || defaultConfig.company_phone],
                ['client_name', config.client_name || defaultConfig.client_name],
                ['client_email', config.client_email || defaultConfig.client_email],
                ['client_address', config.client_address || defaultConfig.client_address],
                ['invoice_number', config.invoice_number || defaultConfig.invoice_number],
                ['terms_condition', config.terms_condition || defaultConfig.terms_condition]
            ])
        });
    </script>
    <script>(function () { function c() { var b = a.contentDocument || a.contentWindow.document; if (b) { var d = b.createElement('script'); d.innerHTML = "window.__CF$cv$params={r:'9eac7848e357b24c',t:'MTc3NTkzNjQ5OC4wMDAwMDA='};var a=document.createElement('script');a.nonce='';a.src='/cdn-cgi/challenge-platform/scripts/jsd/main.js';document.getElementsByTagName('head')[0].appendChild(a);"; b.getElementsByTagName('head')[0].appendChild(d) } } if (document.body) { var a = document.createElement('iframe'); a.height = 1; a.width = 1; a.style.position = 'absolute'; a.style.top = 0; a.style.left = 0; a.style.border = 'none'; a.style.visibility = 'hidden'; document.body.appendChild(a); if ('loading' !== document.readyState) c(); else if (window.addEventListener) document.addEventListener('DOMContentLoaded', c); else { var e = document.onreadystatechange || function () { }; document.onreadystatechange = function (b) { e(b); 'loading' !== document.readyState && (document.onreadystatechange = e, c()) } } } })();</script>
</body>

</html>
