<!doctype html>
<html lang="en" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Challan</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <script src="/_sdk/element_sdk.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&amp;family=Poppins:wght@400;500;600;700&amp;family=IBM+Plex+Mono:wght@400;600&amp;display=swap"
        rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
        }

        .mono {
            font-family: 'IBM Plex Mono', monospace;
        }

        .display-font {
            font-family: 'Playfair Display', serif;
        }

        @media print {
            .no-print {
                display: none !important;
            }

            body {
                background: white !important;
            }

            .challan-wrapper {
                box-shadow: none !important;
            }

            .challan-copy {
                box-shadow: none !important;
            }
        }

        .challan-copy {
            border: 2.5px solid var(--border-color, #1e293b);
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            transition: transform 0.2s ease;
        }

        .challan-copy::after {
            content: '';
            position: absolute;
            right: -10px;
            top: 0;
            bottom: 0;
            width: 10px;
            border-right: 3px dashed rgba(0, 0, 0, 0.1);
        }

        .challan-copy:last-child::after {
            display: none;
        }

        .copy-badge {
            position: absolute;
            top: -1px;
            right: -1px;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 2px 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            border: 1px solid var(--border-color, #1e293b);
            padding: 3px 5px;
            font-size: 9px;
            text-align: left;
        }

        th {
            font-weight: 700;
            text-align: center;
            letter-spacing: 0.03em;
        }

        .field-row {
            display: flex;
            gap: 4px;
            margin-bottom: 4px;
            font-size: 8.5px;
        }

        .field-label {
            font-weight: 700;
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .field-value {
            flex: 1;
            border-bottom: 1.5px solid var(--border-color, #1e293b);
            min-width: 0;
            font-weight: 500;
        }

        .sig-line {
            border-top: 1.5px solid var(--border-color, #1e293b);
            text-align: center;
            font-size: 8px;
            padding-top: 3px;
            margin-top: auto;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .item-row td {
            height: 16px;
            font-weight: 500;
        }

        /* Alternating row colors with better contrast */
        .item-row:nth-child(odd) {
            background: rgba(255, 255, 255, 0.8);
        }

        .item-row:nth-child(even) {
            background: rgba(255, 255, 255, 0.4);
        }

        /* Form styling */
        .form-input {
            width: 100%;
            padding: 6px 8px;
            border: 1.5px solid #cbd5e1;
            border-radius: 6px;
            font-size: 11px;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .add-row-btn {
            font-size: 11px;
            padding: 6px 12px;
            cursor: pointer;
            border: 1.5px solid #64748b;
            background: white;
            border-radius: 6px;
            color: #64748b;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .add-row-btn:hover {
            background: #1e293b;
            color: white;
            border-color: #1e293b;
        }

        .watermark {
            position: absolute;
            opacity: 0.05;
            font-size: 80px;
            font-weight: 700;
            transform: rotate(-45deg);
            pointer-events: none;
        }

        .header-divider {
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--accent-color, #000), transparent);
            margin: 2px 0;
        }
    </style>
    <style>
        body {
            box-sizing: border-box;
        }
    </style>
    <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
</head>

<body class="h-full bg-slate-100 overflow-auto">
    <div class="w-full h-full flex flex-col items-center p-4"><!-- Toolbar -->
        <div class="no-print flex items-center gap-3 mb-4 flex-wrap justify-center">
            <div class="flex items-center gap-2"><label class="text-xs font-medium text-slate-600">Date:</label> <input
                    type="date" id="challanDate" class="form-input w-32">
            </div>
            <div class="flex items-center gap-2"><label class="text-xs font-medium text-slate-600">Vehicle No:</label>
                <input type="text" id="vehicleNo" class="form-input w-28" placeholder="MH-01-XX-1234">
            </div><button onclick="addItemRow()" class="add-row-btn flex items-center gap-1"> <i data-lucide="plus"
                    style="width:12px;height:12px;"></i> Add Row </button> <button onclick="removeItemRow()"
                class="add-row-btn flex items-center gap-1"> <i data-lucide="minus" style="width:12px;height:12px;"></i>
                Remove Row </button> <button onclick="window.print()"
                class="flex items-center gap-1 text-xs px-3 py-1 bg-slate-800 text-white rounded hover:bg-slate-700"> <i
                    data-lucide="printer" style="width:12px;height:12px;"></i> Print </button>
        </div><!-- Challan Container (landscape A4-ish) -->
        <div class="challan-wrapper bg-white shadow-lg" style="width:100%;max-width:1100px;">
            <div class="flex" id="challanContainer" style="gap:14px;padding:12px;">
                <!-- 3 copies will be rendered by JS -->
            </div>
        </div>
    </div>
    <script>
        const defaultConfig = {
            your_company_name: 'YOUR COMPANY NAME',
            company_name: 'PIONEER INDUSTRIES PVT. LTD.',
            company_address: 'Plot No. 42, MIDC Industrial Area, Pune - 411026',
            company_phone: '+91 20 2710 5500',
            company_gstin: '27AABCP1234M1Z5',
            challan_number: 'DC-0001',
            party_name: '',
            party_address: '',
            prepared_by_name: 'Nahian',
            background_color: '#ffffff',
            border_color: '#1e293b',
            accent_color: '#1e40af',
            text_color: '#0f172a',
            badge_color: '#dc2626',
            font_family: 'IBM Plex Sans',
            font_size: 10
        };

        let itemCount = 12;

        const copyTypes = [
            { title: 'DELIVERY CHALLAN', badge: 'ORIGINAL', badgeBg: '#dc2626', accentColor: '#7f1d1d', lightBg: '#fee2e2', lineColor: '#fca5a5' },
            { title: 'DELIVERY CHALLAN', badge: 'RECEIVER COPY', badgeBg: '#2563eb', accentColor: '#1e3a8a', lightBg: '#dbeafe', lineColor: '#93c5fd' },
            { title: 'DELIVERY CHALLAN', badge: 'GATE ENTRY', badgeBg: '#059669', accentColor: '#064e3b', lightBg: '#d1fae5', lineColor: '#6ee7b7' }
        ];

        function getChallanDate() {
            const el = document.getElementById('challanDate');
            return el ? el.value : '';
        }
        function getVehicleNo() {
            const el = document.getElementById('vehicleNo');
            return el ? el.value : '';
        }

        function buildCopyHTML(copyInfo, config) {
            const c = { ...defaultConfig, ...config };
            const sampleItems = [
                { desc: 'Premium Stainless Steel Components', hsn: '7325', qty: '500', price: '₹2,500' },
                { desc: 'Precision Machined Parts (Batch A)', hsn: '8484', qty: '250', price: '₹1,850' },
                { desc: 'Aluminum Extrusions - 50mm Profile', hsn: '7610', qty: '100', price: '₹4,200' },
                { desc: 'Industrial Fasteners Assorted Kit', hsn: '7318', qty: '1000', price: '₹1,200' },
                { desc: 'Copper Conductor Wire - 2.5mm', hsn: '7408', qty: '50', price: '₹3,500' },
                { desc: 'Rubber Gasket Seals (Pack of 100)', hsn: '4016', qty: '5', price: '₹850' },
                { desc: 'Steel Bearing Blocks Premium', hsn: '8482', qty: '30', price: '₹2,100' },
                { desc: 'Plastic Injection Molded Parts', hsn: '3916', qty: '2000', price: '₹1,500' },
                { desc: 'Electrical Cable Assembly 10m', hsn: '8544', qty: '75', price: '₹950' },
                { desc: 'Cast Iron Components - Custom', hsn: '7325', qty: '150', price: '₹3,800' },
                { desc: 'Synthetic Lubricating Oil (5L)', hsn: '2710', qty: '20', price: '₹1,200' },
                { desc: 'Temperature Control Sensors', hsn: '9030', qty: '100', price: '₹4,500' }
            ];

            let rows = '';
            for (let i = 0; i < itemCount; i++) {
                const item = sampleItems[i % sampleItems.length];
                const isReceiver = copyInfo.badge === 'RECEIVER COPY';

                rows += `<tr class="item-row">
      <td style="text-align:center;width:22px;background:${copyInfo.lightBg};font-weight:700;">${String(i + 1).padStart(2, '0')}</td>
      <td style="padding-left:8px;font-size:8px;">${item.desc}</td>
      <td style="text-align:center;width:40px;font-size:8px;">${item.hsn}</td>
      <td style="text-align:center;width:35px;font-weight:700;font-size:8px;">${item.qty}</td>
      <td style="text-align:center;width:50px;font-size:8px;${isReceiver ? 'font-weight:700;color:' + copyInfo.accentColor + ';' : ''}">${isReceiver ? item.price : ''}</td>
    </tr>`;
            }

            return `
  <div class="challan-copy flex flex-col" style="flex:1;padding:0;min-width:0;--border-color:${copyInfo.badgeBg};--accent-color:${copyInfo.accentColor};background:${copyInfo.lightBg};position:relative;">
    <div class="watermark" style="color:${copyInfo.badgeBg};">${copyInfo.badge.split(' ')[0]}</div>
    
    <!-- Premium Header -->
    <div style="background: linear-gradient(135deg, ${copyInfo.badgeBg} 0%, ${copyInfo.accentColor} 100%);color:#fff;padding:10px 8px;text-align:center;position:relative;overflow:hidden;">
      <div style="position:absolute;top:0;left:0;right:0;bottom:0;background:url('data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%2220%22><path d=%22M0,10 Q5,5 10,10 T20,10%22 stroke=%22white%22 stroke-width=%221%22 fill=%22none%22 opacity=%220.1%22/></svg>');opacity:0.3;"></div>
      <div style="position:relative;z-index:2;">
        <div style="font-size:11px;font-weight:800;letter-spacing:0.15em;text-transform:uppercase;text-shadow:0 2px 4px rgba(0,0,0,0.2);">${copyInfo.badge}</div>
        <div style="height:2px;background:#fff;margin:4px auto;width:60%;opacity:0.6;"></div>
      </div>
    </div>

    <div style="padding:8px;border-bottom:2px solid ${copyInfo.lineColor};">
      <!-- Your Company Footer (top-right) -->
      <div style="text-align:right;font-size:7px;color:${c.text_color};font-weight:600;margin-bottom:6px;padding-bottom:4px;border-bottom:1px dashed ${copyInfo.lineColor};">
        <div style="font-size:7.5px;font-weight:700;color:${copyInfo.accentColor};letter-spacing:0.03em;">📋 Challan System by:</div>
        <div class="your-company-name display-font" style="font-size:9px;font-weight:700;color:${copyInfo.accentColor};margin-top:1px;letter-spacing:0.02em;">${c.your_company_name}</div>
      </div>

      <!-- Company Header with Logo Placeholder -->
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;justify-content:center;">
        <div style="width:32px;height:32px;border:2px solid ${copyInfo.accentColor};border-radius:6px;display:flex;align-items:center;justify-content:center;background:${copyInfo.lightBg};">
          <div style="font-weight:800;color:${copyInfo.accentColor};font-size:14px;font-family:'Playfair Display',serif;">P</div>
        </div>
        <div style="flex:1;">
          <div class="company-name display-font" style="font-size:13px;font-weight:700;color:${copyInfo.accentColor};letter-spacing:0.03em;">${c.company_name}</div>
          <div class="company-addr" style="font-size:7px;color:${c.text_color};font-weight:500;line-height:1.2;">${c.company_address}</div>
        </div>
      </div>
      
      <div style="text-align:center;padding-top:3px;border-top:1px solid ${copyInfo.lineColor};">
        <div style="font-size:7px;color:${c.text_color};font-weight:600;">Ph: <span class="company-phone">${c.company_phone}</span> | GSTIN: <span class="company-gstin mono">${c.company_gstin}</span></div>
        <div class="display-font" style="font-size:11px;font-weight:700;margin-top:3px;color:${copyInfo.accentColor};letter-spacing:0.06em;letter-spacing:0.05em;">${copyInfo.title}</div>
      </div>

      <!-- Modern Card-Based Details Section -->
      <div style="margin-top:6px;padding-top:6px;border-top:1px dashed ${copyInfo.lineColor};">
        <!-- Top Row: Challan & Date Cards -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:5px;">
          <div style="background:white;border:1.2px solid ${copyInfo.lineColor};border-radius:4px;padding:4px 5px;box-shadow:0 1px 2px rgba(0,0,0,0.05);">
            <div style="font-size:6.5px;font-weight:700;color:${copyInfo.accentColor};text-transform:uppercase;letter-spacing:0.03em;margin-bottom:2px;opacity:0.8;">📌 Challan #</div>
            <div class="mono challan-no" style="font-size:9px;font-weight:800;color:${copyInfo.accentColor};letter-spacing:0.05em;">${c.challan_number}</div>
          </div>
          <div style="background:white;border:1.2px solid ${copyInfo.lineColor};border-radius:4px;padding:4px 5px;box-shadow:0 1px 2px rgba(0,0,0,0.05);">
            <div style="font-size:6.5px;font-weight:700;color:${copyInfo.accentColor};text-transform:uppercase;letter-spacing:0.03em;margin-bottom:2px;opacity:0.8;">📅 Date</div>
            <div class="mono" style="font-size:9px;font-weight:700;color:${copyInfo.accentColor};">${getChallanDate()}</div>
          </div>
        </div>

        <!-- Party Info Card -->
        <div style="background:white;border:1.2px solid ${copyInfo.lineColor};border-radius:4px;padding:5px;margin-bottom:5px;box-shadow:0 1px 2px rgba(0,0,0,0.05);">
          <div style="font-size:6.5px;font-weight:700;color:${copyInfo.accentColor};text-transform:uppercase;letter-spacing:0.03em;margin-bottom:3px;opacity:0.8;display:flex;align-items:center;gap:2px;">
            <span style="font-size:10px;">👤</span>PARTY DETAILS
          </div>
          <div style="display:grid;gap:3px;">
            <div>
              <div style="font-size:6px;color:${copyInfo.accentColor};font-weight:600;opacity:0.7;text-transform:uppercase;">Name:</div>
              <div class="party-name" style="font-size:8px;font-weight:700;color:${c.text_color};">${c.party_name || 'Not specified'}</div>
            </div>
            <div>
              <div style="font-size:6px;color:${copyInfo.accentColor};font-weight:600;opacity:0.7;text-transform:uppercase;">Address:</div>
              <div class="party-addr" style="font-size:8px;font-weight:500;color:${c.text_color};line-height:1.2;">${c.party_address || 'Not specified'}</div>
            </div>
          </div>
        </div>

        <!-- Vehicle Card -->
        <div style="background:white;border:1.2px solid ${copyInfo.lineColor};border-radius:4px;padding:4px 5px;box-shadow:0 1px 2px rgba(0,0,0,0.05);">
          <div style="font-size:6.5px;font-weight:700;color:${copyInfo.accentColor};text-transform:uppercase;letter-spacing:0.03em;margin-bottom:2px;opacity:0.8;display:flex;align-items:center;gap:2px;">
            <span style="font-size:10px;">🚗</span>Vehicle
          </div>
          <div class="mono" style="font-size:9px;font-weight:800;color:${copyInfo.accentColor};letter-spacing:0.05em;">${getVehicleNo() || '---'}</div>
        </div>
      </div>
    </div>

    <!-- Enhanced Table with gradient header -->
    <table style="margin-bottom:auto;flex-grow:1;--border-color:${copyInfo.badgeBg};border-color:${copyInfo.badgeBg};">
      <thead>
        <tr style="background: linear-gradient(135deg, ${copyInfo.badgeBg} 0%, ${copyInfo.accentColor} 100%);color:#fff;position:sticky;top:0;font-weight:700;">
          <th style="width:22px;font-size:8px;padding:4px;letter-spacing:0.03em;">#</th>
          <th style="font-size:8px;padding:4px;letter-spacing:0.03em;">DESCRIPTION OF GOODS</th>
          <th style="width:40px;font-size:8px;padding:4px;letter-spacing:0.03em;">HSN/SAC</th>
          <th style="width:35px;font-size:8px;padding:4px;letter-spacing:0.03em;">QTY</th>
          <th style="width:50px;font-size:8px;padding:4px;letter-spacing:0.03em;">${copyInfo.badge === 'RECEIVER COPY' ? 'PRICE' : 'REMARKS'}</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>

    <!-- Enhanced Footer with Signature Lines -->
    <div style="padding:8px;border-top:2px solid ${copyInfo.lineColor};background:linear-gradient(to bottom, transparent, ${copyInfo.lightBg});">
      ${copyInfo.badge === 'RECEIVER COPY' ? `
      <div style="background:${copyInfo.lightBg};border:1.5px solid ${copyInfo.lineColor};border-radius:6px;padding:6px;margin-bottom:8px;">
        <div style="display:flex;gap:6px;font-size:8px;margin-bottom:6px;align-items:flex-end;">
          <div style="flex:1;">
            <span style="font-weight:700;color:${copyInfo.accentColor};font-size:7.5px;text-transform:uppercase;letter-spacing:0.04em;">Subtotal:</span>
            <div style="border-bottom:1px solid ${copyInfo.lineColor};padding-top:2px;text-align:right;font-weight:600;color:${copyInfo.accentColor};">₹28,700</div>
          </div>
          <div style="flex:1;">
            <span style="font-weight:700;color:${copyInfo.accentColor};font-size:7.5px;text-transform:uppercase;letter-spacing:0.04em;">VAT (5%):</span>
            <div style="border-bottom:1px solid ${copyInfo.lineColor};padding-top:2px;text-align:right;font-weight:600;color:${copyInfo.accentColor};">₹1,435</div>
          </div>
          <div style="flex:1;">
            <span style="font-weight:700;color:${copyInfo.accentColor};font-size:7.5px;text-transform:uppercase;letter-spacing:0.04em;">IGST (18%):</span>
            <div style="border-bottom:1px solid ${copyInfo.lineColor};padding-top:2px;text-align:right;font-weight:600;color:${copyInfo.accentColor};">₹5,166</div>
          </div>
        </div>
        <div style="width:100%;">
          <span style="font-weight:700;color:${copyInfo.accentColor};font-size:7.5px;text-transform:uppercase;letter-spacing:0.04em;display:inline-block;background:${copyInfo.lightBg};padding:0 3px;">Total Amount:</span>
          <div style="border:2px solid ${copyInfo.accentColor};border-radius:4px;padding:4px;text-align:center;font-weight:800;color:${copyInfo.accentColor};font-size:11px;margin-top:3px;">₹35,301</div>
        </div>
      </div>
      ` : ''}
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">
        <div style="text-align:center;">
          <div style="height:28px;border:1px solid ${copyInfo.lineColor};border-radius:4px;margin-bottom:3px;background:rgba(255,255,255,0.5);display:flex;align-items:center;justify-content:center;">
            <div class="prepared-name display-font" style="font-size:14px;font-weight:700;color:${copyInfo.accentColor};letter-spacing:0.05em;font-style:italic;">${c.prepared_by_name}</div>
          </div>
          <div class="sig-line" style="margin-top:0;--border-color:${copyInfo.badgeBg};color:${copyInfo.accentColor};font-size:7.5px;border:none;">Prepared By</div>
        </div>
        <div style="text-align:center;">
          <div style="height:28px;border:1px solid ${copyInfo.lineColor};border-radius:4px;margin-bottom:3px;background:rgba(255,255,255,0.5);"></div>
          <div class="sig-line" style="margin-top:0;--border-color:${copyInfo.badgeBg};color:${copyInfo.accentColor};font-size:7.5px;border:none;">Verified By</div>
        </div>
        <div style="text-align:center;">
          <div style="height:28px;border:1px solid ${copyInfo.lineColor};border-radius:4px;margin-bottom:3px;background:rgba(255,255,255,0.5);"></div>
          <div class="sig-line" style="margin-top:0;--border-color:${copyInfo.badgeBg};color:${copyInfo.accentColor};font-size:7.5px;border:none;">Received By</div>
        </div>
      </div>
      <div style="text-align:center;font-size:7px;color:${copyInfo.accentColor};margin-top:6px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;">Authorized Signatory</div>
    </div>

    <!-- Your Company Footer at Bottom -->
    <div style="background:linear-gradient(135deg, ${copyInfo.badgeBg}15 0%, ${copyInfo.accentColor}10 100%);border-top:1.5px solid ${copyInfo.lineColor};padding:6px 8px;text-align:center;margin-top:auto;">
      <div style="font-size:7px;color:${copyInfo.accentColor};font-weight:700;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:2px;">Challan System Powered by</div>
      <div class="your-company-name display-font" style="font-size:10px;font-weight:800;color:${copyInfo.accentColor};letter-spacing:0.03em;">${c.your_company_name}</div>
      <div style="font-size:6.5px;color:${copyInfo.accentColor};opacity:0.7;margin-top:2px;font-weight:500;">Professional Business Solutions</div>
    </div>
  </div>`;
        }

        function renderAll(config) {
            const c = { ...defaultConfig, ...config };
            const container = document.getElementById('challanContainer');
            container.innerHTML = copyTypes.map(ct => buildCopyHTML(ct, c)).join('');
            document.documentElement.style.setProperty('--border-color', c.border_color);
        }

        function addItemRow() { if (itemCount < 15) { itemCount++; renderAll(window.elementSdk?.config || {}); } }
        function removeItemRow() { if (itemCount > 2) { itemCount--; renderAll(window.elementSdk?.config || {}); } }

        // Date & vehicle reactivity
        document.addEventListener('DOMContentLoaded', () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('challanDate').value = today;
            document.getElementById('challanDate').addEventListener('change', () => renderAll(window.elementSdk?.config || {}));
