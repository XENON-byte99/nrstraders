name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Get Date
      id: get-date
      run: |
        echo "date=$(date -u +'%Y%m%d')" >> $GITHUB_OUTPUT
      shell: bash

    - name: Cache Buildozer global directory
      uses: actions/cache@v4
      with:
        path: .buildozer
        key: buildozer-global-${{ runner.os }}-${{ steps.get-date.outputs.date }}

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          git \
          ffmpeg \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev \
          libportmidi-dev \
          libswscale-dev \
          libavformat-dev \
          libavcodec-dev \
          zlib1g-dev \
          libunwind-dev \
          libgstreamer1.0-dev \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good \
          libsqlite3-dev \
          sqlite3 \
          bzip2 \
          libbz2-dev \
          libssl-dev \
          openssl \
          libgdbm-dev \
          libgdbm-compat-dev \
          liblzma-dev \
          libreadline-dev \
          libncursesw5-dev \
          libffi-dev \
          uuid-dev \
          openjdk-17-jdk

    - name: Install buildozer
      run: |
        pip3 install --user --upgrade Cython==0.29.33 buildozer

    - name: Verify buildozer installation
      run: |
        python3 -c "import buildozer; print('Buildozer is installed successfully! Version:', buildozer.__version__)"
        echo "PATH is: $PATH"
        which buildozer || echo "buildozer not in PATH"
        ls -la ~/.local/bin/buildozer || echo "buildozer not found in ~/.local/bin"

    - name: Build with Buildozer
      run: |
        set -o pipefail
        yes | python3 -m buildozer android debug 2>&1 | tee buildozer.log
      env:
        BUILDOZER_WARN_ON_ROOT: 0

    - name: Upload Buildozer Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: buildozer-log
        path: buildozer.log

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: nrs-software-apk
        path: bin/*.apk

    - name: Commit and push Buildozer Logs
      if: always()
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add buildozer.log || echo "No buildozer.log to add"
        git commit -m "Upload Buildozer log for run $GITHUB_RUN_ID [skip ci]" || echo "Nothing to commit"
        git push origin HEAD:build-logs --force
