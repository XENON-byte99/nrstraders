{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Joint Download - {{ doc_type|title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Poppins:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f0f4f8; margin: 0; padding: 20px; }
        #loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .spinner { border: 4px solid rgba(0,0,0,0.1); width: 40px; height: 40px; border-radius: 50%; border-left-color: #4f46e5; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .page-break { page-break-before: always; margin-top: 40px; }
        @media print {
            body { background: white; margin: 0; padding: 0; }
            .no-print { display: none !important; }
            .page-break { margin-top: 0; }
            @page { margin: 0; }
        }
        #controls { position: fixed; top: 20px; right: 20px; z-index: 9999; display: none; gap: 10px; flex-direction: column; }
    </style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <h2 style="color: #4f46e5;">Generating Joint {{ doc_type|title }}s...</h2>
        <p id="progressText">0 / {{ transactions.count }}</p>
    </div>

    <div id="controls" class="no-print">
        <div style="background: white; padding: 10px; border-radius: 6px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 8px;">
            <label style="font-size: 11px; font-weight: 700; color: #1e293b; display: flex; align-items: center; gap: 6px; cursor: pointer;">
                <input type="radio" name="amount_toggle" value="base" checked onchange="toggleAmountDisplay(this.value)"> 
                Show Base Amount
            </label>
            <label style="font-size: 11px; font-weight: 700; color: #1e293b; display: flex; align-items: center; gap: 6px; cursor: pointer;">
                <input type="radio" name="amount_toggle" value="target" onchange="toggleAmountDisplay(this.value)"> 
                Show Target Amount (Incl. VAT/Tax)
            </label>
        </div>
        <div id="totals-toggle-box" style="background: white; padding: 10px; border-radius: 6px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: none; flex-direction: column; gap: 8px;">
            <div style="font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 2px;">Totals Rows Toggle</div>
            <label id="lbl-show-service-charge" style="font-size: 11px; font-weight: 700; color: #1e293b; display: flex; align-items: center; gap: 6px; cursor: pointer;">
                <input type="checkbox" id="chk-show-service-charge" checked onchange="toggleTotalsRow('service-charge', this.checked)"> 
                Show Service Charge
            </label>
            <label id="lbl-show-discount" style="font-size: 11px; font-weight: 700; color: #1e293b; display: flex; align-items: center; gap: 6px; cursor: pointer;">
                <input type="checkbox" id="chk-show-discount" checked onchange="toggleTotalsRow('discount', this.checked)"> 
                Show Discount
            </label>
            <label id="lbl-show-price-after-deduction" style="font-size: 11px; font-weight: 700; color: #1e293b; display: flex; align-items: center; gap: 6px; cursor: pointer;">
                <input type="checkbox" id="chk-show-price-after-deduction" checked onchange="toggleTotalsRow('price-after-deduction', this.checked)"> 
                Show Price After Deduction
            </label>
            <label id="lbl-show-duty" style="font-size: 11px; font-weight: 700; color: #1e293b; display: flex; align-items: center; gap: 6px; cursor: pointer;">
                <input type="checkbox" id="chk-show-duty" checked onchange="toggleTotalsRow('duty', this.checked)"> 
                Show Duty
            </label>
            <label id="lbl-show-vat" style="font-size: 11px; font-weight: 700; color: #1e293b; display: flex; align-items: center; gap: 6px; cursor: pointer;">
                <input type="checkbox" id="chk-show-vat" checked onchange="toggleTotalsRow('vat', this.checked)"> 
                Show VAT
            </label>
            <label id="chk-show-tax-lbl" style="font-size: 11px; font-weight: 700; color: #1e293b; display: flex; align-items: center; gap: 6px; cursor: pointer;">
                <input type="checkbox" id="chk-show-tax" checked onchange="toggleTotalsRow('tax', this.checked)"> 
                Show TAX
            </label>
        </div>
        <div style="background: white; padding: 10px; border-radius: 6px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 8px;">
            <label style="font-size: 11px; font-weight: 700; color: #1e293b; display: flex; align-items: center; gap: 6px; cursor: pointer;">
                <input type="checkbox" onchange="toggleEditMode(this.checked)"> 
                Enable Edit & Live Calculation
            </label>
        </div>
        <div style="display: flex; gap: 10px;">
            <button onclick="window.print()" style="flex: 1; padding:10px 15px; background:#4f46e5; color:white; border:none; border-radius:6px; font-weight:bold; cursor:pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">Print All</button>
            <button onclick="downloadJointPDF()" style="flex: 1; padding:10px 15px; background:#dc2626; color:white; border:none; border-radius:6px; font-weight:bold; cursor:pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">Download Joint PDF</button>
        </div>
    </div>

    <div id="multiPrintContainer" style="display: none; align-items: center; flex-direction: column; gap: 40px; padding-bottom: 40px;"></div>

    <script>
        const txIds = [{% for tx in transactions %}{{ tx.id }}{% if not forloop.last %},{% endif %}{% endfor %}];
        const docType = "{{ doc_type }}";
        const container = document.getElementById('multiPrintContainer');
        const loading = document.getElementById('loading');
        const controls = document.getElementById('controls');
        const progressText = document.getElementById('progressText');
        
        // Ensure amount toggles work for multiple docs
        function toggleAmountDisplay(mode) {
            const els = document.querySelectorAll('#multiPrintContainer > div > div');
            els.forEach(container => {
                if (mode === 'target') {
                    container.classList.remove('mode-base');
                    container.classList.add('mode-target');
                } else {
                    container.classList.remove('mode-target');
                    container.classList.add('mode-base');
                }
            });
        }

        function toggleTotalsRow(type, show) {
            let selector = '';
            if (type === 'service-charge') {
                selector = '[data-amount-row-id="service-charge"], [data-amount-row-id="service-charge-0"], [data-amount-row-id="service-charge-1"]';
            } else {
                selector = `[data-amount-row-id="${type}"]`;
            }
            
            document.querySelectorAll(selector).forEach(row => {
                if (show) {
                    row.classList.remove('hidden-row');
                } else {
                    row.classList.add('hidden-row');
                }
            });
            
            const keyPrefix = docType === 'quotation' ? 'hide_totals_row_q_' : 'hide_totals_row_';
            localStorage.setItem(keyPrefix + type, show ? '1' : '0');
        }

        async function loadDocuments() {
            let styleInjected = false;
            
            for (let i = 0; i < txIds.length; i++) {
                progressText.innerText = `${i + 1} / ${txIds.length}`;
                
                try {
                    const response = await fetch(`/bills/${txIds[i]}/print/${docType}/`);
                    const html = await response.text();
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    
                    if (!styleInjected) {
                        const styles = doc.querySelectorAll('style');
                        styles.forEach(s => {
                            if (!s.innerText.includes('spinner')) { // avoid conflicts
                                document.head.appendChild(s.cloneNode(true));
                            }
                        });
                        styleInjected = true;
                    }
                    
                    let content = doc.getElementById('invoiceContent') || 
                                  doc.getElementById('quotationContent') || 
                                  doc.getElementById('challanContent') || 
                                  doc.querySelector('.mushok-form');
                                  
                    if (content) {
                        // Create a wrapper for page break
                        const wrapper = document.createElement('div');
                        if (i > 0) {
                            wrapper.className = 'page-break html2pdf__page-break';
                        }
                        
                        // For challan we need to preserve copies-container grid layout
                        if (content.id === 'challanContent') {
                            const copiesWrapper = document.createElement('div');
                            copiesWrapper.className = 'copies-container';
                            copiesWrapper.innerHTML = content.innerHTML;
                            wrapper.appendChild(copiesWrapper);
                        } else {
                            wrapper.appendChild(content.cloneNode(true));
                        }
                        
                        container.appendChild(wrapper);
                    }
                } catch (e) {
                    console.error("Error loading document:", e);
                }
            }
            
            loading.style.display = 'none';
            container.style.display = 'flex';
            controls.style.display = 'flex';
            
            // Show/hide appropriate checkboxes based on docType
            const toggleBox = document.getElementById('totals-toggle-box');
            if (toggleBox) {
                if (docType === 'invoice' || docType === 'quotation') {
                    toggleBox.style.display = 'flex';
                    if (docType === 'invoice') {
                        document.getElementById('lbl-show-service-charge').style.display = 'flex';
                        document.getElementById('lbl-show-discount').style.display = 'none';
                        document.getElementById('lbl-show-price-after-deduction').style.display = 'none';
                        document.getElementById('lbl-show-duty').style.display = 'flex';
                        document.getElementById('lbl-show-vat').style.display = 'flex';
                        document.getElementById('chk-show-tax-lbl').style.display = 'flex';
                    } else {
                        document.getElementById('lbl-show-service-charge').style.display = 'flex';
                        document.getElementById('lbl-show-discount').style.display = 'flex';
                        document.getElementById('lbl-show-price-after-deduction').style.display = 'flex';
                        document.getElementById('lbl-show-duty').style.display = 'none';
                        document.getElementById('lbl-show-vat').style.display = 'none';
                        document.getElementById('chk-show-tax-lbl').style.display = 'none';
                    }
                }
            }

            // Apply persistent visibility states
            const keyPrefix = docType === 'quotation' ? 'hide_totals_row_q_' : 'hide_totals_row_';
            const rowTypes = docType === 'quotation' ? ['service-charge', 'discount', 'price-after-deduction'] : ['service-charge', 'duty', 'vat', 'tax'];
            rowTypes.forEach(type => {
                const val = localStorage.getItem(keyPrefix + type);
                const chk = document.getElementById('chk-show-' + type);
                if (val === '0') {
                    if (chk) chk.checked = false;
                    toggleTotalsRow(type, false);
                } else {
                    if (chk) chk.checked = true;
                    toggleTotalsRow(type, true);
                }
            });
            
            // Hide amount toggles if it's a challan which doesn't use them
            if (docType === 'challan') {
                controls.children[0].style.display = 'none';
            }

            // Initialize signature dragging
            initSignatureDrag();

            // Apply the company-shared saved layout (same one used for single prints)
            applyBulkLayout();
        }

        // Per-bill: fetch EACH bill's own saved layout and apply it to that
        // bill's wrapper only. Wrappers were appended in txIds order.
        async function applyBulkLayout() {
            const cont = document.getElementById('multiPrintContainer');
            if (!cont) return;
            const wrappers = Array.from(cont.children);
            for (let i = 0; i < wrappers.length; i++) {
                const txId = txIds[i];
                if (txId === undefined || txId === null) continue;
                let state = null;
                try {
                    const srv = await fetch('/api/print-layouts/' + txId + '/' + docType + '/').then(function (r) { return r.json(); });
                    if (srv && srv.store && srv.store.templates) {
                        state = srv.store.templates[srv.store.activeTemplate];
                    }
                } catch (e) { /* skip this bill */ }
                if (state) applyLayoutToWrapper(wrappers[i], state);
            }
        }

        // Apply one bill's saved layout to its own wrapper (scoped, not global).
        function applyLayoutToWrapper(wrapper, state) {
            // Column layout (hide / rename / resize)
            wrapper.querySelectorAll('table').forEach(function (table, tIdx) {
                const tState = state.tables && state.tables[tIdx];
                if (!tState || !tState.cols) return;
                const ths = Array.from(table.querySelectorAll('thead th'));
                const trs = Array.from(table.querySelectorAll('tbody tr'));
                if (tState.cols.length !== ths.length) return;
                tState.cols.forEach(function (colState, colIdx) {
                    const th = ths[colIdx];
                    if (!th) return;
                    if (colState.text) th.innerHTML = colState.text;
                    if (colState.width) th.style.width = colState.width;
                    if (colState.hidden) {
                        th.classList.add('hidden-col');
                        trs.forEach(function (tr) { if (tr.children[colIdx]) tr.children[colIdx].classList.add('hidden-col'); });
                    }
                });
            });

            // Hidden totals rows — scoped to this wrapper
            if (state.hiddenRows) {
                state.hiddenRows.forEach(function (rowId) {
                    wrapper.querySelectorAll('.amount-row[data-amount-row-id="' + rowId + '"]').forEach(function (r) { r.classList.add('hidden-row'); });
                });
            }

            // Typography (text size / font / colour) — scoped to this wrapper
            if (state.typography) {
                const t = state.typography;
                const docEl = wrapper.querySelector('.a4-invoice, .mushok-form') || wrapper;
                if (t.scale && t.scale !== 100) docEl.style.zoom = (t.scale / 100);
                if (t.family) {
                    wrapper.querySelectorAll('*:not(.mono):not(.fas):not(.far):not(.fab)').forEach(function (el) { el.style.fontFamily = t.family; });
                }
                if (t.color) {
                    wrapper.querySelectorAll('td, .info-value, .terms, .terms-note').forEach(function (el) { el.style.color = t.color; });
                }
            }
        }

        function downloadJointPDF() {
            const element = document.getElementById('multiPrintContainer');
            if (!element) return;

            const filename = `Joint_${docType.toUpperCase()}s.pdf`;
            
            // Remove gap/padding temporarily for clean PDF
            const oldGap = element.style.gap;
            const oldPadding = element.style.paddingBottom;
            element.style.gap = '0';
            element.style.paddingBottom = '0';
            
            // Also remove shadows from all inner items
            const shadowItems = element.querySelectorAll('.a4-invoice, .mushok-form, .challan-copy');
            const oldShadows = [];
            shadowItems.forEach((item, i) => {
                oldShadows[i] = item.style.boxShadow;
                item.style.boxShadow = 'none';
                item.style.margin = '0';
            });

            // Adjust settings for Challan (Landscape A3) vs Others (Portrait A4)
            let opt = {
                margin: 0,
                filename: filename,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 1.5, useCORS: true, letterRendering: true, windowWidth: 1200 },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
            };

            if (docType === 'challan') {
                opt.html2canvas.scale = 1.2;
                opt.jsPDF = { unit: 'in', format: 'a3', orientation: 'landscape' };
                // Ensure layout doesn't break in canvas
                element.style.width = '100%';
            }

            html2pdf().set(opt).from(element).save().then(() => {
                // Restore styles
                element.style.gap = oldGap;
                element.style.paddingBottom = oldPadding;
                shadowItems.forEach((item, i) => {
                    item.style.boxShadow = oldShadows[i];
                });
            });
        }

        // --- Live Edit and Calculation Script ---
        function toggleEditMode(enabled) {
            const containers = document.querySelectorAll('.a4-invoice, .mushok-form, .challan-copy, .quotation-container');
            containers.forEach(container => {
                container.contentEditable = enabled ? "true" : "false";
                // Prevent editing on elements that shouldn't be edited
                container.querySelectorAll('.display-base, .display-target').forEach(el => {
                    el.contentEditable = "inherit";
                });
            });

            if (enabled && !window.liveCalcBound) {
                window.liveCalcBound = true;
                bindLiveCalculations();
            }
        }

        function extractNum(text) {
            if (!text) return 0;
            const match = text.replace(/,/g, '').match(/[\d\.]+/);
            return match ? parseFloat(match[0]) : 0;
        }

        function bindLiveCalculations() {
            const container = document.getElementById('multiPrintContainer');
            if (!container) return;
            
            container.addEventListener('input', (e) => {
                const td = e.target.closest('td');
                if (!td) return;
                
                const tr = td.closest('tr');
                const table = tr.closest('table');
                if (!table) return;

                const headers = Array.from(table.querySelectorAll('thead th')).map(th => th.innerText.trim().toLowerCase());
                const qtyIdx = headers.findIndex(h => h === 'qty');
                const rateIdx = headers.findIndex(h => h === 'rate');
                const amountIdx = headers.findIndex(h => h === 'amount' || h === 'cost');

                const tds = Array.from(tr.children);
                const cellIdx = tds.indexOf(td);

                if (cellIdx === qtyIdx || cellIdx === rateIdx || cellIdx === amountIdx) {
                    if (qtyIdx !== -1 && rateIdx !== -1 && cellIdx !== amountIdx) {
                        const qty = extractNum(tds[qtyIdx].innerText);
                        const rate = extractNum(tds[rateIdx].innerText);
                        const amount = qty * rate;
                        
                        const amountTd = tds[amountIdx];
                        const baseSpan = amountTd.querySelector('.display-base');
                        if (baseSpan) {
                            baseSpan.innerText = '৳' + amount.toFixed(3);
                            const targetSpan = amountTd.querySelector('.display-target');
                            if (targetSpan) targetSpan.innerText = '৳' + amount.toFixed(2);
                        } else {
                            amountTd.innerText = '৳' + amount.toFixed(3);
                        }
                    }
                    
                    const invoiceContainer = td.closest('.a4-invoice, .mushok-form, .challan-copy, .quotation-container');
                    if (invoiceContainer) {
                        recalculateInvoiceTotals(invoiceContainer);
                    }
                }
            });
        }

        function recalculateInvoiceTotals(container) {
            let subtotals = [];
            let totalSubtotal = 0;

            container.querySelectorAll('table').forEach(table => {
                let tableSub = 0;
                const headers = Array.from(table.querySelectorAll('thead th')).map(th => th.innerText.trim().toLowerCase());
                const amountIdx = headers.findIndex(h => h === 'amount' || h === 'cost');
                
                if (amountIdx !== -1) {
                    table.querySelectorAll('tbody tr').forEach(tr => {
                        if (tr.children[amountIdx]) {
                            const amountTd = tr.children[amountIdx];
                            const valText = amountTd.querySelector('.display-base') ? amountTd.querySelector('.display-base').innerText : amountTd.innerText;
                            tableSub += extractNum(valText);
                        }
                    });
                }
                subtotals.push(tableSub);
                totalSubtotal += tableSub;
            });

            // Update subtotal
            const amountRows = container.querySelectorAll('.amount-row');
            
            // Get discount percentage from the Discount row
            let discountPct = 0;
            amountRows.forEach(row => {
                const labelEl = row.querySelector('.amount-label');
                if (labelEl && labelEl.innerText.toLowerCase().includes('discount')) {
                    const pctMatches = [...labelEl.innerText.matchAll(/([\d\.]+)%/g)];
                    if (pctMatches.length > 0) {
                        discountPct = parseFloat(pctMatches[0][1]);
                    }
                }
            });

            // Keep track of base, service charge, discount, price after deduction, and tax amounts per category
            // We support up to 2 categories (Primary = index 0, Secondary = index 1)
            let serviceCharges = [0, 0];
            let discounts = [0, 0];
            let priceAfterDeductions = [0, 0];

            // 1. Calculate Service Charge for each category
            amountRows.forEach(row => {
                const labelEl = row.querySelector('.amount-label');
                const valueEl = row.querySelector('.amount-value');
                if (!labelEl || !valueEl) return;
                const label = labelEl.innerText.toLowerCase();
                const baseSpan = valueEl.querySelector('.display-base') || valueEl;

                if (label.includes('subtotal')) {
                    baseSpan.innerText = '৳' + totalSubtotal.toFixed(3);
                } else if (label.includes('service charge')) {
                    const pctMatches = [...labelEl.innerText.matchAll(/([\d\.]+)%/g)];
                    if (pctMatches.length > 0) {
                        const pct = parseFloat(pctMatches[0][1]);
                        const catIdxStr = row.getAttribute('data-category-index');
                        if (catIdxStr !== null) {
                            const catIdx = parseInt(catIdxStr);
                            serviceCharges[catIdx] = (subtotals[catIdx] || 0) * (pct / 100);
                            valueEl.innerText = '৳' + serviceCharges[catIdx].toFixed(3);
                        } else {
                            serviceCharges[0] = totalSubtotal * (pct / 100);
                            valueEl.innerText = '৳' + serviceCharges[0].toFixed(3);
                        }
                    }
                }
            });

            // 2. Calculate Discount (percentage + flat) and Price After Deduction per category
            const flatHost = container.hasAttribute && container.hasAttribute('data-discount-flat') ? container : (container.closest ? container.closest('[data-discount-flat]') : null);
            const discountFlat = flatHost ? (parseFloat(flatHost.getAttribute('data-discount-flat')) || 0) : 0;
            if (subtotals.length > 1) {
                const base0 = subtotals[0] + serviceCharges[0];
                const base1 = subtotals[1] + serviceCharges[1];
                const baseAll = base0 + base1;
                // Split the flat discount across categories proportionally to their base
                discounts[0] = base0 * (discountPct / 100) + (baseAll > 0 ? discountFlat * (base0 / baseAll) : 0);
                priceAfterDeductions[0] = base0 - discounts[0];

                discounts[1] = base1 * (discountPct / 100) + (baseAll > 0 ? discountFlat * (base1 / baseAll) : 0);
                priceAfterDeductions[1] = base1 - discounts[1];
            } else {
                discounts[0] = (totalSubtotal + serviceCharges[0]) * (discountPct / 100) + discountFlat;
                priceAfterDeductions[0] = (totalSubtotal + serviceCharges[0]) - discounts[0];
            }

            // Update discount row in UI
            let totalDiscountAmt = discounts[0] + discounts[1];
            amountRows.forEach(row => {
                const labelEl = row.querySelector('.amount-label');
                const valueEl = row.querySelector('.amount-value');
                if (!labelEl || !valueEl) return;
                const label = labelEl.innerText.toLowerCase();
                const baseSpan = valueEl.querySelector('.display-base') || valueEl;

                if (label.includes('discount')) {
                    baseSpan.innerText = '৳' + totalDiscountAmt.toFixed(3);
                }
            });

            const totalPriceAfterDeduction = priceAfterDeductions[0] + priceAfterDeductions[1];

            // 3. Update Price After Deduction row, and calculate taxes
            let grandTotal = totalPriceAfterDeduction;

            amountRows.forEach(row => {
                const labelEl = row.querySelector('.amount-label');
                const valueEl = row.querySelector('.amount-value');
                if (!labelEl || !valueEl) return;
                const label = labelEl.innerText.toLowerCase();
                const baseSpan = valueEl.querySelector('.display-base') || valueEl;

                if (label.includes('price after deduction')) {
                    const displayBaseSpan = valueEl.querySelector('.display-base');
                    if (displayBaseSpan) {
                        displayBaseSpan.innerText = '৳' + totalPriceAfterDeduction.toFixed(3);
                    } else {
                        valueEl.innerText = '৳' + totalPriceAfterDeduction.toFixed(3);
                    }
                } else if (!label.includes('subtotal') && !label.includes('service charge') && !label.includes('discount') && !label.includes('grand total')) {
                    // Tax / VAT / Duty / AIT
                    const pctMatches = [...labelEl.innerText.matchAll(/([\d\.]+)%/g)];
                    if (pctMatches.length > 0) {
                        let taxAmt = 0;
                        const catIdxStr = row.getAttribute('data-category-index');
                        if (catIdxStr !== null) {
                            const catIdx = parseInt(catIdxStr);
                            const pct = parseFloat(pctMatches[0][1]);
                            taxAmt = priceAfterDeductions[catIdx] * (pct / 100);
                        } else if (pctMatches.length === 1 || subtotals.length === 1) {
                            const pct = parseFloat(pctMatches[0][1]);
                            taxAmt = priceAfterDeductions[0] * (pct / 100);
                        } else {
                            pctMatches.forEach((match, idx) => {
                                const pct = parseFloat(match[1]);
                                taxAmt += priceAfterDeductions[idx] * (pct / 100);
                            });
                        }
                        
                        valueEl.innerText = '৳' + taxAmt.toFixed(3);
                        grandTotal += taxAmt;
                    }
                }
            });

            // 4. Update Grand Total & target spans
            amountRows.forEach(row => {
                const labelEl = row.querySelector('.amount-label');
                if (!labelEl) return;
                const label = labelEl.innerText.toLowerCase();
                if (label.includes('grand total')) {
                    const val = row.querySelector('.amount-value');
                    const baseSpan = val.querySelector('.display-base');
                    if (baseSpan) {
                        baseSpan.innerText = '৳' + grandTotal.toFixed(3);
                        const targetSpan = val.querySelector('.display-target');
                        if (targetSpan) targetSpan.innerText = '৳' + grandTotal.toFixed(3);
                    } else {
                        val.innerText = '৳' + grandTotal.toFixed(3);
                    }
                } else if (label.includes('price after deduction')) {
                    const val = row.querySelector('.amount-value');
                    const targetSpan = val.querySelector('.display-target');
                    if (targetSpan) targetSpan.innerText = '৳' + grandTotal.toFixed(3);
                }
            });
        }

        function initSignatureDrag() {
            const signatureBoxes = document.querySelectorAll('.signature-box');
            signatureBoxes.forEach(box => {
                let isDragging = false;
                let currentX = 0;
                let currentY = 0;
                let initialX = 0;
                let initialY = 0;
                let xOffset = 0;
                let yOffset = 0;

                box.addEventListener('mousedown', dragStart);
                document.addEventListener('mousemove', drag);
                document.addEventListener('mouseup', dragEnd);

                function dragStart(e) {
                    if (e.target.closest('.signature-box') === box) {
                        initialX = e.clientX - xOffset;
                        initialY = e.clientY - yOffset;
                        isDragging = true;
                        box.style.cursor = 'grabbing';
                    }
                }

                function drag(e) {
                    if (isDragging) {
                        e.preventDefault();
                        currentX = e.clientX - initialX;
                        currentY = e.clientY - initialY;
                        xOffset = currentX;
                        yOffset = currentY;
                        box.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;
                    }
                }

                function dragEnd(e) {
                    if (isDragging) {
                        initialX = currentX;
                        initialY = currentY;
                        isDragging = false;
                        box.style.cursor = 'grab';
                    }
                }
            });
        }

        window.onload = loadDocuments;
    </script>

    <!-- Print Template Auto-loader & Editor Logic -->
    <style>
        th.resizable { position: relative; }
        .resizer {
            width: 5px; height: 100%; position: absolute; right: 0; top: 0; cursor: col-resize; z-index: 1;
        }
        .hide-col-btn {
            position: absolute; left: 5px; top: 5px; cursor: pointer; color: #ffcccc; font-size: 10px; display: none; z-index: 2;
        }
        th:hover .hide-col-btn { display: inline-block; }
        .hidden-col { display: none !important; }
        .edit-mode-active th.resizable { outline: 1px dashed #ccc; }
        .hide-row-btn {
            margin-left: 8px; cursor: pointer; color: #ef4444; font-size: 10px; display: none; z-index: 2;
        }
        .amount-row:hover .hide-row-btn { display: inline-block; }
        .hidden-row { display: none !important; }
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const templateKey = 'print_template_v2_' + ('{{ transaction.transaction_category.id }}' || 'default') + '_' + window.location.pathname.split('/').filter(Boolean).pop();
            
            function reattachRowEditControls(row, rowId) {
                if (rowId === 'grand-total' || rowId === 'subtotal') return;
                if (!row.querySelector('.hide-row-btn')) {
                    const hbtn = document.createElement('i');
                    hbtn.className = 'fas fa-eye-slash hide-row-btn no-print';
                    hbtn.contentEditable = "false";
                    row.appendChild(hbtn);
                    hbtn.addEventListener('click', function(e) {
                        document.querySelectorAll(`.amount-row[data-amount-row-id="${rowId}"]`).forEach(r => {
                            r.classList.add('hidden-row');
                        });
                        saveTemplateState();
                        e.stopPropagation();
                    });
                }
            }

            // 1. Auto-load template state
            const savedStateStr = localStorage.getItem(templateKey);
            if (savedStateStr) {
                try {
                    const state = JSON.parse(savedStateStr);
                    document.querySelectorAll('table').forEach((table, tableIdx) => {
                        const tState = state.tables[tableIdx];
                        if (!tState) return;
                        
                        const ths = Array.from(table.querySelectorAll('th'));
                        const trs = Array.from(table.querySelectorAll('tbody tr'));
                        
                        if (tState.cols && tState.cols.length === ths.length) {
                            tState.cols.forEach((colState, colIdx) => {
                                const th = ths[colIdx];
                                
                                if (colState.text) {
                                    th.innerHTML = colState.text;
                                }
                                if (colState.width) th.style.width = colState.width;
                                if (colState.hidden) {
                                    th.classList.add('hidden-col');
                                    trs.forEach(tr => {
                                        if (tr.children[colIdx]) tr.children[colIdx].classList.add('hidden-col');
                                    });
                                }
                            });
                        }
                    });

                    if (state.hiddenRows) {
                        state.hiddenRows.forEach(rowId => {
                            document.querySelectorAll(`.amount-row[data-amount-row-id="${rowId}"]`).forEach(row => {
                                row.classList.add('hidden-row');
                            });
                        });
                    }
                } catch(e) { console.error('Error loading template state', e); }
            }

            // 2. Setup Editing Controls
            const editToggle = document.querySelector('input[onchange*="toggleEditMode"]');
            if (editToggle) {
                const origToggle = editToggle.onchange;
                editToggle.onchange = function(e) {
                    origToggle.call(this, e);
                    const isEdit = this.checked;
                    document.body.classList.toggle('edit-mode-active', isEdit);
                    
                    document.querySelectorAll('table').forEach(table => {
                        const ths = table.querySelectorAll('th');
                        ths.forEach((th, idx) => {
                            if (isEdit) {
                                th.classList.add('resizable');
                                th.contentEditable = "true";
                                
                                // Add resizer
                                if (!th.querySelector('.resizer')) {
                                    const resizer = document.createElement('div');
                                    resizer.className = 'resizer no-print';
                                    resizer.contentEditable = "false";
                                    th.appendChild(resizer);
                                    
                                    let startX, startW;
                                    resizer.addEventListener('mousedown', function(e) {
                                        startX = e.clientX;
                                        startW = th.offsetWidth;
                                        const onMove = e => { th.style.width = (startW + e.clientX - startX) + 'px'; };
                                        const onUp = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); saveTemplateState(); };
                                        document.addEventListener('mousemove', onMove);
                                        document.addEventListener('mouseup', onUp);
                                        e.stopPropagation();
                                    });
                                }
                                
                                // Add hide button
                                if (!th.querySelector('.hide-col-btn')) {
                                    const hbtn = document.createElement('i');
                                    hbtn.className = 'fas fa-eye-slash hide-col-btn no-print';
                                    hbtn.contentEditable = "false";
                                    th.appendChild(hbtn);
                                    
                                    hbtn.addEventListener('click', function(e) {
                                        th.classList.add('hidden-col');
                                        Array.from(table.querySelectorAll('tbody tr')).forEach(tr => {
                                            if (tr.children[idx]) tr.children[idx].classList.add('hidden-col');
                                        });
                                        saveTemplateState();
                                        e.stopPropagation();
                                    });
                                }
                            } else {
                                th.contentEditable = "false";
                                th.classList.remove('resizable');
                                const rs = th.querySelector('.resizer'); if(rs) rs.remove();
                                const hb = th.querySelector('.hide-col-btn'); if(hb) hb.remove();
                            }
                        });
                    });

                    document.querySelectorAll('.amount-row').forEach(row => {
                        const rowId = row.dataset.amountRowId;
                        if (isEdit) {
                            reattachRowEditControls(row, rowId);
                        } else {
                            const hb = row.querySelector('.hide-row-btn'); if(hb) hb.remove();
                        }
                    });
                };
            }
            
            // Add restore button in the floating panel
            const floatingPanel = document.querySelector('.no-print');
            if (floatingPanel && !document.getElementById('restoreTemplateBtn')) {
                const btnDiv = document.createElement('div');
                btnDiv.innerHTML = '<button id="restoreTemplateBtn" style="padding:6px 10px; background:#475569; color:white; border:none; border-radius:6px; font-weight:bold; cursor:pointer; width:100%; font-size:11px;">Reset Template Layout</button>';
                floatingPanel.appendChild(btnDiv);
                document.getElementById('restoreTemplateBtn').addEventListener('click', function() {
                    localStorage.removeItem(templateKey);
                    location.reload();
                });
            }

            // Save state on any edits
            document.addEventListener('input', function(e) {
                if (e.target.tagName === 'TH' && document.body.classList.contains('edit-mode-active')) {
                    saveTemplateState();
                }
            });

            function saveTemplateState() {
                const state = { tables: [], hiddenRows: [] };
                document.querySelectorAll('table').forEach(table => {
                    const tState = { cols: [] };
                    table.querySelectorAll('th').forEach((th, idx) => {
                        // strip out elements that are resizer/hider
                        let clone = th.cloneNode(true);
                        const rs = clone.querySelector('.resizer'); if(rs) rs.remove();
                        const hb = clone.querySelector('.hide-col-btn'); if(hb) hb.remove();
                        
                        tState.cols.push({
                            text: clone.innerHTML,
                            width: th.style.width,
                            hidden: th.classList.contains('hidden-col')
                        });
                    });
                    state.tables.push(tState);
                });

                document.querySelectorAll('.amount-row').forEach(row => {
                    const rowId = row.dataset.amountRowId;
                    if (rowId && row.classList.contains('hidden-row') && !state.hiddenRows.includes(rowId)) {
                        state.hiddenRows.push(rowId);
                    }
                });

                localStorage.setItem(templateKey, JSON.stringify(state));
            }
        });
    </script>

</body>
</html>
