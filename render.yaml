services:
  - type: web
    name: nrs-software
    env: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn nrs_project.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.12"
      - key: DATABASE_URL
        fromDatabase:
          name: nrs-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"

databases:
  - name: nrs-db
    plan: free
